eck-elasticsearch:
  enabled: true
  fullnameOverride: elasticsearch
  version: 8.12.0
  spec:
    nodeSets:
    - name: default
      count: 1
      config:
        node.store.allow_mmap: false
        index.number_of_replicas: 0
      volumeClaimTemplates:
      - metadata:
          name: elasticsearch-data
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

eck-kibana:
  enabled: true
  fullnameOverride: kibana
  version: 8.12.0
  spec:
    count: 1
    elasticsearchRef:
      name: elasticsearch

eck-beats:
  enabled: true
  fullnameOverride: filebeat
  version: 8.12.0
  clusterRoleBinding:
    name: elastic-beat-autodiscover-binding
    subjects:
    - kind: ServiceAccount
      name: elastic-beat-filebeat-quickstart
    roleRef:
      kind: ClusterRole
      name: elastic-beat-autodiscover
      apiGroup: rbac.authorization.k8s.io
  spec:
    type: filebeat
    elasticsearchRef:
      name: elasticsearch
    config:
      filebeat.inputs:
      - type: container
        paths:
          - /var/log/containers/*.log
      processors:
        - add_kubernetes_metadata:
            host: ${NODE_NAME}
            matchers:
              - logs_path:
                  logs_path: "/var/log/containers/"
    daemonSet:
      podTemplate:
        spec:
          serviceAccountName: elastic-beat-filebeat-quickstart
          automountServiceAccountToken: true
          terminationGracePeriodSeconds: 30
          dnsPolicy: ClusterFirstWithHostNet
          hostNetwork: true
          securityContext:
            runAsUser: 0
          containers:
          - name: filebeat
            env:
              - name: NODE_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
            resources:
              requests:
                cpu: 50m
                memory: 100Mi
              limits:
                cpu: 200m
                memory: 200Mi
            volumeMounts:
            - name: varlogcontainers
              mountPath: /var/log/containers
              readOnly: true
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
          tolerations:
          - key: node-role.kubernetes.io/master
            effect: NoSchedule
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
          volumes:
          - name: varlogcontainers
            hostPath:
              path: /var/log/containers
          - name: varlogpods
            hostPath:
              path: /var/log/pods