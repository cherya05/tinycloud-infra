apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ include "tinycloud-backend.fullname" . }}-elasticsearch-storageclass
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
    volume.kubernetes.io: ebs.csi.aws.com
provisioner: ebs.csi.aws.com
parameters:
  type: {{ .Values.storageclass.type }}
  encrypted: {{ .Values.storageclass.encrypted | quote }}
  fsType: {{ .Values.storageclass.fsType }}
volumeBindingMode: {{ .Values.storageclass.volumeBindingMode }}
allowVolumeExpansion: {{ .Values.storageclass.allowVolumeExpansion }}
reclaimPolicy: {{ .Values.storageclass.reclaimPolicy }}

